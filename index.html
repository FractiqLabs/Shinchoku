        const CareFacilityApp = () => {

          const [sortConfig, setSortConfig] = React.useState({ key: null, direction: 'asc' });
          const [applicants, setApplicants] = React.useState([]);

          const [newPost, setNewPost] = React.useState('');

          const [postType, setPostType] = React.useState('');
          const [replyTo, setReplyTo] = React.useState(null);
          const [inlineReplyTo, setInlineReplyTo] = React.useState(null);
          const [inlineReplyContent, setInlineReplyContent] = React.useState('');
          const [likes, setLikes] = React.useState({});
          const [editingPostId, setEditingPostId] = React.useState(null);
          const [editingContent, setEditingContent] = React.useState('');
          const [deletingPostId, setDeletingPostId] = React.useState(null);

          const [showEditPostModal, setShowEditPostModal] = React.useState(false);
          const [showDeletePostModal, setShowDeletePostModal] = React.useState(false);
          const [showEditReplyModal, setShowEditReplyModal] = React.useState(false);
          const [showDeleteReplyModal, setShowDeleteReplyModal] = React.useState(false);
          const [showActions, setShowActions] = React.useState(true);
          const [currentMemo, setCurrentMemo] = React.useState('');
          const [isSavingMemo, setIsSavingMemo] = React.useState(false);

          

          const [formData, setFormData] = React.useState({
            surname: '',
            givenName: '',
            age: '',
            careLevel: '',
            address: '',
            kp: '',
            kpRelationship: '',
            kpContact: '',
            kpAddress: '',
            careManager: '',
            careManagerName: '',
            cmContact: '',
            assignee: '',
            notes: ''
          });

          // ユーザーデータ（サーバー側で管理）
          const users = {
            'a': { password: 'admin1', name: '藤堂　友未枝' },
            'b': { password: 'admin2', name: '吉野　隼人' },
            'c': { password: 'admin3', name: '田中　慎治' }
          };

          // ログイン状態をチェック
          React.useEffect(() => {
            const token = localStorage.getItem('authToken');
            if (token) {
              // トークンの検証とユーザー情報の取得
              try {
                let payload;
                try {
                  // まずシンプルなbase64エンコード形式を試す（日本語文字対応）
                  payload = JSON.parse(decodeURIComponent(escape(atob(token))));
                } catch (error) {
                  // 失敗したら単純なatobを試す
                  payload = JSON.parse(atob(token));
                }
                
                if (payload.exp * 1000 > Date.now()) {
                  setCurrentUser({ id: payload.id, name: payload.name });
                  setIsLoggedIn(true);
                  apiClient.setToken(token);
                  apiClient.connectSocket();
                  loadApplicants();
                } else {
                  localStorage.removeItem('authToken');
                }
              } catch (error) {
                console.error('Token validation failed:', error);
                localStorage.removeItem('authToken');
              }
            }
          }, []);

          // メモ内容の初期化
          React.useEffect(() => {
            const savedMemo = localStorage.getItem('shinchoku-memo');
            if (savedMemo) {
              setCurrentMemo(savedMemo);
            }
          }, []);

          // メモ内容の自動保存
          React.useEffect(() => {
            localStorage.setItem('shinchoku-memo', currentMemo);
          }, [currentMemo]);

          // デバッグ用: currentViewの変更を監視
          React.useEffect(() => {
            console.log('🟢 currentView changed to:', currentView);
          }, [currentView]);

          // デバッグ用: selectedApplicantの変更を監視
          React.useEffect(() => {
            console.log('🟣 selectedApplicant changed to:', selectedApplicant?.name || 'null');
          }, [selectedApplicant]);


          // 申込者データを読み込み
          const loadApplicants = async () => {
            try {
              const data = await apiClient.getApplicants();
              setApplicants(data);
            } catch (error) {
              console.error('Failed to load applicants:', error);
            }
          };

          // WebSocketリアルタイム同期の設定
          React.useEffect(() => {
            if (isLoggedIn && apiClient.socket) {
              // 新しい申込者追加の通知
              apiClient.on('newApplicant', (data) => {
                console.log('New applicant added:', data);
                loadApplicants(); // データを再読み込み
              });

              // 申込者情報更新の通知
              apiClient.on('applicantUpdate', (data) => {
                console.log('Applicant updated:', data);
                loadApplicants(); // データを再読み込み
              });

              // ステータス更新の通知
              apiClient.on('statusUpdate', (data) => {
                console.log('Status updated:', data);
                if (selectedApplicant && selectedApplicant.id == data.applicantId) {
                  // 詳細ページが開いている場合は最新データを取得
                  loadApplicantDetail(data.applicantId);
                }
                loadApplicants(); // 一覧も更新
              });

              // 新しい投稿の通知
              apiClient.on('newPost', (post) => {
                console.log('New post added:', post);
                if (selectedApplicant && selectedApplicant.id == post.applicant_id) {
                  // 詳細ページが開いている場合は最新データを取得
                  loadApplicantDetail(post.applicant_id);
                }
              });
            }

            return () => {
              if (apiClient) {
                apiClient.off('newApplicant');
                apiClient.off('applicantUpdate');
                apiClient.off('statusUpdate');
                apiClient.off('newPost');
              }
            };
          }, [isLoggedIn, selectedApplicant]);

          // 申込者詳細データを読み込み
          const loadApplicantDetail = async (applicantId) => {
            try {
              const data = await apiClient.getApplicant(applicantId);
              setSelectedApplicant(data);
              // メモを読み込み（memoフィールドを使用）
              setCurrentMemo(data.memo || '');
            } catch (error) {
              console.error('Failed to load applicant detail:', error);
            }
          };

          // ログイン処理
          const handleLogin = async (e) => {
            e.preventDefault();
            setLoginError('');
            
            try {
              // 名前からIDを逆引き
              const userId = Object.keys(users).find(id => users[id].name === loginForm.id);
              const user = userId ? users[userId] : null;
              
              if (!user || user.password !== loginForm.password) {
                setLoginError('ユーザーまたはパスワードが正しくありません。');
                return;
              }

              // サーバーサイド認証は一時的にスキップして、クライアント側で認証
              const userData = { id: userId, name: user.name };
              setCurrentUser(userData);
              setIsLoggedIn(true);
              
              // 仮のトークンを作成（実際のサーバー実装時は削除）
              const mockToken = btoa(unescape(encodeURIComponent(JSON.stringify({
                id: userId,
                name: user.name,
                exp: Math.floor(Date.now() / 1000) + (24 * 60 * 60) // 24時間
              }))));
              
              localStorage.setItem('authToken', mockToken);
              apiClient.setToken(mockToken);
              apiClient.connectSocket();
              
              setLoginForm({ id: '', password: '' });
              await loadApplicants();
            } catch (error) {
              console.error('Login failed:', error);
              setLoginError('ログインに失敗しました。');
            }
          };

          // ログアウト処理
          const handleLogout = () => {
            setIsLoggedIn(false);
            setCurrentUser(null);
            localStorage.removeItem('authToken');
            apiClient.clearToken();
            apiClient.disconnectSocket();
            setCurrentView('list');
            setApplicants([]);
          };

          

          // ログインフォームの入力処理
          const handleLoginInputChange = (e) => {
            const { name, value } = e.target;
            setLoginForm(prev => ({
              ...prev,
              [name]: value
            }));
          };

          // LocalStorage保存は不要（サーバー側で管理）
          // React.useEffect(() => {
          //   try {
          //     localStorage.setItem('careFacilityApplicants', JSON.stringify(applicants));
          //   } catch (error) {
          //     console.error('Failed to save applicants to localStorage', error);
          //   }
          // }, [applicants]);

          const getStatusColor = (status, applicationDate) => {
            const today = new Date();
            const appDate = new Date(applicationDate);
            const daysPassed = Math.floor((today - appDate) / (1000 * 60 * 60 * 24));
            
            if (daysPassed > 10) return 'status-red';
            if (daysPassed > 5) return 'status-yellow';
            return 'status-green';
          };

          const formatTimeAgo = (timestamp) => {
            const today = new Date();
            const date = new Date(timestamp);
            const diffTime = Math.abs(today - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return '今日';
            if (diffDays === 1) return '1日前';
            if (diffDays < 7) return `${diffDays}日前`;
            return timestamp;
          };

          const handleSort = (key) => {
            let direction = 'asc';
            if (sortConfig.key === key && sortConfig.direction === 'asc') {
              direction = 'desc';
            }
            setSortConfig({ key, direction });
          };

          const getSortIcon = (key) => {
            if (sortConfig.key !== key) return '↕';
            return sortConfig.direction === 'asc' ? '↑' : '↓';
          };

          // ダッシュボード用の統計情報を計算
          const dashboardStats = React.useMemo(() => {
            const totalApplicants = applicants.length;
            const waitingApplicants = applicants.filter(app => 
              !['入居完了', 'キャンセル', '入居不可'].includes(app.status)
            ).length;
            
            const statusCounts = applicants.reduce((counts, app) => {
              counts[app.status] = (counts[app.status] || 0) + 1;
              return counts;
            }, {});

            const urgentCases = applicants.filter(app => {
              const appDate = new Date(app.applicationDate);
              const daysSinceApplication = (Date.now() - appDate) / (1000 * 60 * 60 * 24);
              return daysSinceApplication > 30 && !['入居完了', 'キャンセル', '入居不可'].includes(app.status);
            }).length;

            return {
              totalApplicants,
              waitingApplicants,
              statusCounts,
              urgentCases,
              occupancyRate: ((facilityInfo.occupiedBeds / facilityInfo.totalBeds) * 100).toFixed(1)
            };
          }, [applicants, facilityInfo]);

          // キーボードショートカット
          React.useEffect(() => {
            const handleKeyDown = (e) => {
              // Ctrl/Cmd キーとの組み合わせのみ
              if (!(e.ctrlKey || e.metaKey) || e.altKey || e.shiftKey) return;
              
              switch (e.key.toLowerCase()) {
                case 'd':
                  e.preventDefault();
                  setCurrentView('dashboard');
                  break;
                case 'l':
                  e.preventDefault();
                  setCurrentView('list');
                  break;
                case 'n':
                  e.preventDefault();
                  if (currentView === 'list') {
                    setShowModal(true);
                  }
                  break;
                case '/':
                  e.preventDefault();
                  // 検索入力フィールドにフォーカス
                  const searchInput = document.querySelector('input[placeholder*="検索"], input[placeholder*="見つける"]');
                  if (searchInput) {
                    searchInput.focus();
                  }
                  break;
                case '?':
                  e.preventDefault();
                  setShowKeyboardHelp(true);
                  break;
                case 'escape':
                case 'Escape':
                  // モーダルを閉じる
                  setShowModal(false);
                  setShowEditModal(false);
                  setShowDeleteModal(false);
                  setShowKeyboardHelp(false);
                  // 検索をクリア

                  break;

            };

            document.addEventListener('keydown', handleKeyDown);
            return () => document.removeEventListener('keydown', handleKeyDown);
          }, [currentView]);

          // CSV解析・インポート機能
          const parseCSV = (csvText) => {
            const lines = csvText.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];

            for (let i = 1; i < lines.length; i++) {
              const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
              const row = {};
              headers.forEach((header, index) => {
                row[header] = values[index] || '';
              });
              data.push(row);
            }
            return data;
          };

          const mapCSVToApplicant = (csvRow) => {
            // ほのぼのNEXT想定のマッピング
            const mapping = {
              '利用者番号': 'id',
              '氏名': 'name',
              '姓': 'surname', 
              '名': 'givenName',
              '年齢': 'age',
              '要介護度': 'careLevel',
              '住所': 'address',
              '入居日': 'applicationDate',
              'ステータス': 'status',
              'キーパーソン': 'kp',
              'キーパーソン続柄': 'kpRelationship',
              'キーパーソン連絡先': 'kpContact',
              'ケアマネ事業所': 'careManager',
              'ケアマネ氏名': 'careManagerName',
              'ケアマネ連絡先': 'cmContact',
              '担当者': 'assignee',
              '特記事項': 'notes'
            };

            const mapped = {};
            Object.entries(mapping).forEach(([csvKey, appKey]) => {
              if (csvRow[csvKey]) {
                mapped[appKey] = csvRow[csvKey];
              }
            });

            // 必須データの設定
            if (!mapped.name && mapped.surname && mapped.givenName) {
              mapped.name = `${mapped.surname} ${mapped.givenName}`;
            }
            
            // デフォルト値設定
            mapped.id = mapped.id || Date.now();
            mapped.applicationDate = mapped.applicationDate || new Date().toISOString().split('T')[0];
            mapped.status = mapped.status || '申込書受領';
            mapped.timeline = [];

            return mapped;
          };

          const handleCSVImport = async (csvData) => {
            try {
              const results = {
                success: 0,
                error: 0,
                errors: [],
                imported: []
              };

              let newOccupiedBeds = facilityInfo.occupiedBeds;

              for (const row of csvData) {
                try {
                  const applicant = mapCSVToApplicant(row);
                  
                  // バリデーション
                  if (!applicant.name) {
                    results.errors.push(`行${results.success + results.error + 1}: 氏名が必要です`);
                    results.error++;
                    continue;
                  }

                  // 重複チェック
                  const existingApplicant = applicants.find(app => 
                    app.name === applicant.name || app.id == applicant.id
                  );

                  if (existingApplicant) {
                    // 既存データを更新
                    const updatedApplicants = applicants.map(app => 
                      app.id == applicant.id ? { ...app, ...applicant } : app
                    );
                    setApplicants(updatedApplicants);
                    results.imported.push(`${applicant.name}さん（更新）`);
                  } else {
                    // 新規追加
                    applicant.timeline = [{
                      id: Date.now(),
                      content: 'CSVインポートにより登録',
                      author: currentUser?.name || 'システム',
                      timestamp: new Date().toISOString(),
                      action: applicant.status
                    }];
                    
                    setApplicants(prev => [...prev, applicant]);
                    results.imported.push(`${applicant.name}さん（新規）`);
                  }

                  // 入居状況の更新
                  if (applicant.status === '入居完了' || applicant.status === '入居中') {
                    newOccupiedBeds++;
                  }

                  results.success++;
                } catch (error) {
                  results.errors.push(`行${results.success + results.error + 1}: ${error.message}`);
                  results.error++;
                }
              }

              // ベッド状況更新
              if (newOccupiedBeds !== facilityInfo.occupiedBeds) {
                setFacilityInfo(prev => ({
                  ...prev,
                  occupiedBeds: Math.min(newOccupiedBeds, prev.totalBeds),
                  availableBeds: prev.totalBeds - Math.min(newOccupiedBeds, prev.totalBeds)
                }));
              }

              setCsvImportResult(results);
              
            } catch (error) {
              setCsvImportResult({
                success: 0,
                error: 1,
                errors: [`CSVファイルの処理中にエラーが発生しました: ${error.message}`],

              });

                .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];

              const statusMapping = {
                '申込書受領': '申込書受領',
                '実調日程調整中': '実調日程調整中',
                '実調完了': '実調完了',
                '健康診断書依頼': '健康診断書待ち',
                '健康診断書受領': '健康診断書受領',
                '判定会議中': '判定会議中',
                '入居決定': '入居決定',
                '入居不可': '入居不可',
                '入居日調整中': '入居日調整中',
                '書類送付済': '書類送付済',
                '入居準備完了': '入居準備完了',
                '入居完了': '入居完了',
                'キャンセル': 'キャンセル'
              };

              const newStatus = latestActionPost && statusMapping[latestActionPost.action] 
                ? statusMapping[latestActionPost.action]
                : '申込書受領'; // デフォルトステータス

              // Firestoreに保存（タイムラインとステータス両方更新）
              await apiClient.updateFirestoreDocument('applicants', selectedApplicant.id, {
                timeline: updatedTimeline,
                status: newStatus
              });

              // ローカル状態を更新
              const updatedApplicants = applicants.map(app => {
                if (app.id === selectedApplicant.id) {
                  return { 
                    ...app, 
                    timeline: updatedTimeline,
                    status: newStatus
                  };
                }
                return app;
              });

              setApplicants(updatedApplicants);
              const updatedSelected = updatedApplicants.find(app => app.id === selectedApplicant.id);
              setSelectedApplicant(updatedSelected);

              setDeletingPostId(null);
              setShowDeletePostModal(false);
              
            } catch (error) {
              console.error('Failed to delete post:', error);
              alert('投稿の削除に失敗しました。');
            }
          };

          const submitPost = async () => {
            if (!newPost.trim()) return;
            
            try {
              // 新しいAPIClient.createPostメソッドを使用
              await apiClient.createPost(
                selectedApplicant.id,
                newPost,
                postType || null,
                replyTo
              );
              
              // 即座にローカル状態を更新
              const newTimelineItem = {
                id: Date.now(),
                author: currentUser.name,
                timestamp: new Date().toISOString(),
                content: newPost,
                action: postType || null,
                replies: []
              };
              
              let updatedTimeline;
              let newStatus = selectedApplicant.status;
              
              if (replyTo) {
                // 返信の場合
                updatedTimeline = selectedApplicant.timeline.map(post => {
                  if (post.id === replyTo) {
                    return {
                      ...post,
                      replies: [...(post.replies || []), {
                        id: Date.now(),
                        author: currentUser.name,
                        timestamp: new Date().toISOString(),
                        content: newPost
                      }]
                    };
                  }
                  return post;
                });
              } else {
                // 新規投稿の場合
                updatedTimeline = [newTimelineItem, ...selectedApplicant.timeline];
                
                // アクションに応じてステータスを更新
                const statusMapping = {
                  '申込書受領': '申込書受領',
                  '実調日程調整中': '実調日程調整中',
                  '実調完了': '実調完了',
                  '健康診断書依頼': '健康診断書待ち',
                  '健康診断書受領': '健康診断書受領',
                  '判定会議中': '判定会議中',
                  '入居決定': '入居決定',
                  '入居不可': '入居不可',
                  '入居日調整中': '入居日調整中',
                  '書類送付済': '書類送付済',
                  '入居準備完了': '入居準備完了',
                  '入居完了': '入居完了',
                  'キャンセル': 'キャンセル'
                };
                
                if (statusMapping[postType]) {
                  newStatus = statusMapping[postType];
                }
              }
              
              // 即座にローカル状態を更新
              const updatedApplicant = {
                ...selectedApplicant,
                timeline: updatedTimeline,
                status: newStatus
              };
              
              setSelectedApplicant(updatedApplicant);
              
              // 申込者リストも更新
              const updatedApplicants = applicants.map(app => {
                if (app.id === selectedApplicant.id) {
                  return updatedApplicant;
                }
                return app;
              });
              setApplicants(updatedApplicants);
              
              // フォームをリセット
              setNewPost('');
              setShowPostForm(false);
              setPostType('');
              setReplyTo(null);
              
              // バックグラウンドで最新データを同期（エラーが発生しても無視）
              try {
                await loadApplicantDetail(selectedApplicant.id);
                await loadApplicants();
              } catch (syncError) {
                console.warn('Background sync failed:', syncError);
              }
              
            } catch (error) {
              console.error('Failed to submit post:', error);
              alert('投稿の送信に失敗しました。');
            }
          };

          if (currentView === 'detail' && selectedApplicant) {
            const allActions = [
              '申込書受領', '実調日程調整中', '実調完了', '健康診断書依頼',
              '健康診断書受領', '判定会議中', '入居可否', '入居日調整中',
              '書類送付済', '入居準備完了', '入居完了', 'キャンセル'
            ];

            const completedActions = selectedApplicant.timeline
              .filter(item => item.action)
              .map(item => item.action);
            
            // 「入居不可」「キャンセル」が投稿されている場合の判定
            const hasRejection = completedActions.includes('入居不可');
            const hasCancel = completedActions.includes('キャンセル');
            
            // 「入居不可」時の無効化対象（入居可否を含む全後続アクション）
            const actionsAfterRejection = hasRejection ? [
              '入居可否', '入居日調整中', '書類送付済', '入居準備完了', '入居完了'
            ] : [];
            
            // 「キャンセル」時の無効化対象（キャンセル以外の全アクション）
            const actionsDisabledByCancel = hasCancel ? 
              allActions.filter(action => action !== 'キャンセル') : [];

            return (
              <div className="container">
                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px'}}>
                  <div style={{display: 'flex', alignItems: 'center'}}>
                    <div 
                      onClick={() => {
                        console.log('🔴 Header clicked, returning to list');
                        setCurrentView('list');
                        setSelectedApplicant(null);
                      }}
                      style={{
                        fontFamily: 'kirin-Regular',
                        fontSize: '28px',
                        fontWeight: '500',
                        color: '#2c3e50',
                        letterSpacing: '-0.5px',
                        cursor: 'pointer',
                        transition: 'color 0.2s ease'
                      }}
                      onMouseOver={(e) => e.target.style.color = '#34495e'}
                      onMouseOut={(e) => e.target.style.color = '#2c3e50'}
                    >
                      シンチョク.
                    </div>
                  </div>
                  <div style={{textAlign: 'right'}}>
                    <div className="user-greeting">
                      こんにちは、{currentUser?.name}さん
                    </div>
                    <button onClick={handleLogout} className="logout-btn">
                      ログアウト
                    </button>
                  </div>
                </div>
                
                <div className="detail-header">
                  <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '16px'}}>
                    <div>
                      <h1 className="detail-title">
                        {selectedApplicant.name}さん ({selectedApplicant.age}歳・{selectedApplicant.careLevel})
                      </h1>
                      <div className={`status-badge ${getStatusColor(selectedApplicant.status, selectedApplicant.applicationDate)}`}>
                        {selectedApplicant.status}
                      </div>
                    </div>
                    <div style={{minWidth: '300px'}}>
                      <input
                        type="text"
                        className="form-input"
                        placeholder="情報を素早く見つける"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                        style={{
                          width: '100%',
                          fontSize: '14px',
                          padding: '8px 12px'
                        }}
                      />
                    </div>
                  </div>

                  {(!searchTerm || 
                    selectedApplicant.assignee?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.address?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.kp?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.kpRelationship?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.kpContact?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.kpAddress?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.careManager?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.careManagerName?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.cmContact?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    selectedApplicant.notes?.toLowerCase().includes(searchTerm.toLowerCase())
                  ) && (
                    <div className="detail-info">
                      <div className="info-section">
                        <h3>基本情報</h3>
                        <div className="info-item">申込日: {selectedApplicant.applicationDate}</div>
                        {selectedApplicant.assignee && <div className="info-item">担当者: {selectedApplicant.assignee}</div>}
                        {selectedApplicant.address && <div className="info-item">住所: {selectedApplicant.address}</div>}
                      </div>
                      <div className="info-section">
                        <h3>KP情報</h3>
                        {selectedApplicant.kp && <div className="info-item">{selectedApplicant.kp}{selectedApplicant.kpRelationship && `（${selectedApplicant.kpRelationship}）`}</div>}
                        {selectedApplicant.kpContact && <div className="info-item">連絡先: {selectedApplicant.kpContact}</div>}
                        {selectedApplicant.kpAddress && <div className="info-item">住所: {selectedApplicant.kpAddress}</div>}
                      </div>
                      <div className="info-section">
                        <h3>ケアマネ・SW情報</h3>
                        {selectedApplicant.careManager && <div className="info-item">居宅介護支援事業所・病院: {selectedApplicant.careManager}</div>}
                        {selectedApplicant.careManagerName && <div className="info-item">ケアマネ・SW: {selectedApplicant.careManagerName}</div>}
                        {selectedApplicant.cmContact && <div className="info-item">連絡先: {selectedApplicant.cmContact}</div>}
                      </div>
                    </div>
                  )}
                  
                  {(!searchTerm || selectedApplicant.notes?.toLowerCase().includes(searchTerm.toLowerCase())) && (
                    <div className="info-section" style={{marginTop: '24px'}}>
                      <h3>特記</h3>
                      <div className="info-item" style={{
                        backgroundColor: '#f8f9fa',
                        padding: '12px',
                        borderRadius: '6px',
                        marginTop: '8px',
                        minHeight: '40px',
                        whiteSpace: 'pre-line',
                        fontStyle: selectedApplicant.notes ? 'normal' : 'italic',
                        color: selectedApplicant.notes ? '#495057' : '#6c757d'
                      }}>
                        {selectedApplicant.notes || '特記事項はありません'}
                      </div>
                    </div>
                  )}
                </div>

                <div className="grid-layout">
                  <div className="timeline-panel">
                    <div className="timeline-header">
                      <button onClick={handleFreePost} className="btn btn-primary">
                        投稿
                      </button>
                    </div>

                    <div className="timeline-content">
                      {showPostForm && (
                        <div className="post-form">
                          {postType && <div style={{fontWeight: '500', marginBottom: '8px', color: '#2c3e50'}}>{postType}</div>}
                          {replyTo && <div style={{fontSize: '14px', color: '#6c757d', marginBottom: '8px'}}>
                            返信先: {selectedApplicant.timeline.find(t => t.id === replyTo)?.author}
                          </div>}
                          {!postType && !replyTo && <div style={{fontWeight: '500', marginBottom: '8px', color: '#2c3e50'}}>投稿を追加</div>}
                          <textarea
                            value={newPost}
                            onChange={(e) => setNewPost(e.target.value)}
                            className="form-textarea"
                            rows="3"
                            placeholder="投稿を入力するかアクションを追加..."
                          />
                          <div className="form-actions">
                            <button
                              onClick={() => {
                                setShowPostForm(false);
                                setPostType('');
                                setReplyTo(null);
                              }}
                              className="btn btn-secondary"
                            >
                              キャンセル
                            </button>
                            <button onClick={submitPost} className="btn btn-primary">
                              投稿
                            </button>
                          </div>
                        </div>
                      )}

                      {selectedApplicant.timeline
                        .filter((item) => {
                          if (!searchTerm) return true;
                          const searchLower = searchTerm.toLowerCase();
                          return (
                            item.content.toLowerCase().includes(searchLower) ||
                            item.author.toLowerCase().includes(searchLower) ||
                            (item.action && item.action.toLowerCase().includes(searchLower)) ||
                            (item.replies && item.replies.some(reply => 
                              reply.content.toLowerCase().includes(searchLower) ||
                              reply.author.toLowerCase().includes(searchLower)
                            ))
                          );
                        })
                        .map((item) => (
                        <div key={item.id} className="timeline-item">
                          <div className="timeline-post">
                            <div className="post-header">
                              <span className="post-author">{item.author}</span>
                              <span className="post-time">
                                {formatTimeAgo(item.timestamp)}
                              </span>
                              {item.action && (
                                <span className="action-badge">
                                  {item.action}
                                </span>
                              )}
                            </div>
                            {item.author === currentUser?.name && (
                              <div className="post-hover-actions">
                                <button onClick={() => handleEditPost(item)} className="btn-icon"><img src="icons/enpitsu.png" alt="編集" style={{width: '18px', height: '18px'}} /></button>
                                <button onClick={() => handleDeletePost(item.id)} className="btn-icon"><img src="icons/gomibako.png" alt="削除" style={{width: '18px', height: '18px'}} /></button>
                              </div>
                            )}
                            <div className="post-content">{item.content}</div>
                            
                            <div className="post-actions">
                              <button
                                onClick={() => handleLike(selectedApplicant.id, item.id)}
                                className={`post-action ${likes[`${selectedApplicant.id}-${item.id}`] ? 'liked' : ''}`}
                              >
                                ♡ {likes[`${selectedApplicant.id}-${item.id}`] ? '1' : '0'}
                              </button>
                              <button onClick={() => handleReply(item.id)} className="post-action">
                                💬 返信
                              </button>
                            </div>

                            {/* インライン返信フォーム */}
                            {inlineReplyTo === item.id && (
                              <div style={{
                                marginTop: '12px',
                                marginLeft: '20px',
                                padding: '12px',
                                backgroundColor: '#f8f9fa',
                                borderRadius: '8px',
                                border: '1px solid #dee2e6'
                              }}>
                                <div style={{fontSize: '14px', color: '#6c757d', marginBottom: '8px'}}>
                                  {item.author}さんに返信
                                </div>
                                <textarea
                                  value={inlineReplyContent}
                                  onChange={(e) => setInlineReplyContent(e.target.value)}
                                  placeholder="返信を入力してください..."
                                  style={{
                                    width: '100%',
                                    minHeight: '60px',
                                    padding: '8px',
                                    border: '1px solid #ddd',
                                    borderRadius: '4px',
                                    resize: 'vertical',
                                    fontSize: '14px'
                                  }}
                                />
                                <div style={{
                                  display: 'flex',
                                  justifyContent: 'flex-end',
                                  gap: '8px',
                                  marginTop: '8px'
                                }}>
                                  <button 
                                    onClick={() => setInlineReplyTo(null)}
                                    style={{
                                      padding: '6px 12px',
                                      border: '1px solid #ccc',
                                      borderRadius: '4px',
                                      backgroundColor: 'white',
                                      cursor: 'pointer'
                                    }}
                                  >
                                    キャンセル
                                  </button>
                                  <button 
                                    onClick={() => submitInlineReply(item.id)}
                                    disabled={!inlineReplyContent.trim()}
                                    style={{
                                      padding: '6px 12px',
                                      border: 'none',
                                      borderRadius: '4px',
                                      backgroundColor: '#007bff',
                                      color: 'white',
                                      cursor: inlineReplyContent.trim() ? 'pointer' : 'not-allowed',
                                      opacity: inlineReplyContent.trim() ? 1 : 0.6
                                    }}
                                  >
                                    送信
                                  </button>
                                </div>
                              </div>
                            )}

                            {item.replies && item.replies.length > 0 && (
                              <div style={{marginLeft: '20px', marginTop: '16px', paddingLeft: '16px', borderLeft: '1px solid #e9ecef'}}>
                                {item.replies.map((reply) => (
                                  <div key={reply.id} className="reply-item">
                                    {reply.author === currentUser?.name && (
                                      <div className="post-hover-actions">
                                        <button onClick={() => handleEditReply(reply, item.id)} className="btn-icon"><img src="icons/enpitsu.png" alt="編集" style={{width: '18px', height: '18px'}} /></button>
                                        <button onClick={() => handleDeleteReply(reply.id, item.id)} className="btn-icon"><img src="icons/gomibako.png" alt="削除" style={{width: '18px', height: '18px'}} /></button>
                                      </div>
                                    )}
                                    <div style={{fontSize: '14px', marginBottom: '4px'}}>
                                      <span style={{fontWeight: '500', color: '#2c3e50'}}>{reply.author}</span>
                                      <span style={{color: '#6c757d', marginLeft: '8px'}}>
                                        · {formatTimeAgo(reply.timestamp)}
                                      </span>
                                    </div>
                                    <div style={{fontSize: '14px', color: '#495057', whiteSpace: 'pre-line'}}>{reply.content}</div>
                                    <div style={{marginTop: '8px', display: 'flex', gap: '16px'}}>
                                      <button
                                        onClick={() => handleLike(selectedApplicant.id, reply.id)}
                                        className={`post-action ${likes[`${selectedApplicant.id}-${reply.id}`] ? 'liked' : ''}`}
                                        style={{fontSize: '12px'}}
                                      >
                                        ♡ {likes[`${selectedApplicant.id}-${reply.id}`] ? '1' : '0'}
                                      </button>
                                      <button onClick={() => handleReply(item.id)} className="post-action" style={{fontSize: '12px'}}>
                                        💬 返信
                                      </button>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            )}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>


                  <div className="actions-panel">
                    <div className="actions-header">
                      <button
                        onClick={() => setShowActions(!showActions)}
                        className="btn btn-ghost"
                      >
                        {showActions ? '閉じる' : '表示'}
                      </button>
                    </div>
                    
                    <div className="actions-content">
                      {showActions ? (
                        <div className="action-list">
                          {allActions.map((action, index) => {
                            const isCompleted = completedActions.includes(action) || 
                                              completedActions.includes('入居決定') && action === '入居可否';
                            const isSubMenuAction = action === '入居可否';
                            const isCancelAction = action === 'キャンセル';
                            const isExpanded = expandedSubMenu === action;
                            const showDivider = action === 'キャンセル';
                            const isDisabledByRejection = hasRejection && actionsAfterRejection.includes(action);
                            const isDisabledByCancel = hasCancel && actionsDisabledByCancel.includes(action);
                            const isDisabled = isDisabledByRejection || isDisabledByCancel;
                            
                            return (
                              <div key={index}>
                                {showDivider && (
                                  <div style={{
                                    margin: '16px 0',
                                    borderTop: '1px solid #dee2e6'
                                  }}>
                                  </div>
                                )}
                                
                                {isSubMenuAction && !isCompleted ? (
                                  <div>
                                    <button
                                      onClick={() => setExpandedSubMenu(isExpanded ? null : action)}
                                      disabled={isCompleted || isDisabled}
                                      className="action-item"
                                      style={{
                                        backgroundColor: isExpanded ? '#ffffff' : (isCompleted || isDisabled ? '#f8f9fa' : '#ffffff'),
                                        color: isCompleted || isDisabled ? '#adb5bd' : '#495057',
                                        borderColor: isExpanded ? '#2c3e50' : '#dee2e6',
                                        margin: '0',
                                        opacity: isCompleted || isDisabled ? 0.5 : 1
                                      }}
                                    >
                                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '100%' }}>
                                        <span>
                                          {isCompleted ? '✓ ' : ''}{action}
                                        </span>
                                        <span style={{ fontSize: '12px', color: '#6c757d', fontWeight: 'bold' }}>
                                          …
                                        </span>
                                      </div>
                                    </button>
                                    
                                    {isExpanded && (
                                      <div style={{
                                        marginTop: '8px',
                                        animation: 'slideDown 0.2s ease-out',
                                        overflow: 'hidden',
                                        paddingLeft: '16px'
                                      }}>
                                        <button
                                          onClick={() => {
                                            handleStatusUpdate('入居決定');
                                            setExpandedSubMenu(null);
                                          }}
                                          className="action-item"
                                          style={{
                                            margin: '0 0 6px 0'
                                          }}
                                        >
                                          入居決定
                                        </button>
                                        <button
                                          onClick={() => {
                                            handleStatusUpdate('入居不可');
                                            setExpandedSubMenu(null);
                                          }}
                                          className="action-item"
                                          style={{
                                            margin: '0'
                                          }}
                                        >
                                          入居不可
                                        </button>
                                      </div>
                                    )}
                                  </div>
                                ) : (
                                  <div style={{ position: 'relative' }}>
                                    <button
                                      onClick={() => handleStatusUpdate(action)}
                                      disabled={isCompleted || isDisabled}
                                      className="action-item"
                                      style={{
                                        backgroundColor: isCompleted || isDisabled ? '#f8f9fa' : '#ffffff',
                                        color: isCompleted || isDisabled ? '#adb5bd' : (isCancelAction ? '#dc3545' : '#495057'),
                                        borderColor: isCancelAction && !isCompleted && !isDisabled ? '#dc3545' : '#dee2e6',
                                        opacity: isCompleted || isDisabled ? 0.5 : 1
                                      }}
                                    >
                                      {isCompleted ? '✓ ' : ''}{action}
                                    </button>
                                  </div>
                                )}
                              </div>
                            );
                          })}

                      ) : (

                              disabled={isSavingMemo}
                              style={{
                                width: '100%',
                                marginBottom: '12px',
                                fontSize: '14px',
                                border: '1px solid #dee2e6',
                                borderRadius: '8px',
                                padding: '12px',
                                backgroundColor: isSavingMemo ? '#f8f9fa' : '#ffffff'

                            />
                            {isSavingMemo && (

                              value={formData.kp}
                              onChange={handleInputChange}
                              className="form-input"
                            />
                          </div>
                          <div className="form-group">
                            <label className="form-label">族柄</label>
                            <select
                              name="kpRelationship"
                              value={formData.kpRelationship}
                              onChange={handleInputChange}
                              className="form-input"
                            >
                              <option value="">選択してください</option>
                              <option value="夫">夫</option>
                              <option value="妻">妻</option>
                              <option value="長男">長男</option>
                              <option value="次男">次男</option>
                              <option value="三男">三男</option>
                              <option value="長女">長女</option>
                              <option value="次女">次女</option>
                              <option value="三女">三女</option>
                              <option value="甥">甥</option>
                              <option value="姪">姪</option>
                              <option value="その他">その他</option>
                            </select>
                          </div>
                        </div>
                        <div className="form-group">
                          <label className="form-label">連絡先</label>
                          <input
                            type="tel"
                            name="kpContact"
                            value={formData.kpContact}
                            onChange={handleInputChange}
                            className="form-input"
                          />
                        </div>
                        <div className="form-group">
                          <label className="form-label">住所</label>
                          <input
                            type="text"
                            name="kpAddress"
                            value={formData.kpAddress}
                            onChange={handleInputChange}
                            className="form-input"
                          />
                        </div>
                        <div className="form-group">
                          <label className="form-label">居宅介護支援事業所・病院</label>
                          <input
                            type="text"
                            name="careManager"
                            value={formData.careManager}
                            onChange={handleInputChange}
                            className="form-input"
                          />
                        </div>
                        <div className="form-group">
                          <label className="form-label">ケアマネ・SW</label>
                          <input
                            type="text"
                            name="careManagerName"
                            value={formData.careManagerName}
                            onChange={handleInputChange}
                            className="form-input"
                          />
                        </div>
                        <div className="form-group">
                          <label className="form-label">連絡先</label>
                          <input
                            type="tel"
                            name="cmContact"
                            value={formData.cmContact}
                            onChange={handleInputChange}
                            className="form-input"
                          />
                        </div>
                        <div className="form-group">
                          <label className="form-label">担当者</label>
                          <select
                            name="assignee"
                            value={formData.assignee}
                            onChange={handleInputChange}
                            className="form-input"
                          >
                            <option value="">選択してください</option>
                            <option value="藤堂　友未枝">藤堂　友未枝</option>
                            <option value="吉野　隼人">吉野　隼人</option>
                            <option value="田中　慎治">田中　慎治</option>
                          </select>
                        </div>
                        <div className="form-group">
                          <label className="form-label">特記</label>
                          <textarea
                            name="notes"
                            value={formData.notes}
                            onChange={handleInputChange}
                            className="form-textarea"
                            rows="3"
                            placeholder="特記事項を入力してください..."
                          />
                        </div>
                      </form>
                    </div>
                    <div className="modal-footer">
                      <button type="button" className="btn btn-secondary" onClick={() => setShowEditModal(false)}>
                        キャンセル
                      </button>
                      <button onClick={handleEditSubmit} className="btn btn-primary">
                        更新
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {showDeleteModal && (
                <div className="modal-overlay" onClick={() => setShowDeleteModal(false)}>
                  <div className="modal delete-modal" onClick={(e) => e.stopPropagation()}>
                    <div className="modal-header">
                      <h3 className="modal-title">申込者削除</h3>
                      <button className="modal-close" onClick={() => setShowDeleteModal(false)}>×</button>
                    </div>
                    <div className="modal-body">
                      <div className="delete-icon"><img src="icons/patoranpu.png" alt="削除" style={{width: '48px', height: '48px'}} /></div>
                      <div className="delete-message">
                        {deletingApplicant?.name}さんを削除しますか？
                      </div>
                      <div className="delete-submessage">
                        この操作は取り消すことができません。
                      </div>
                    </div>
                    <div className="modal-footer">
                      <button type="button" className="btn btn-secondary" onClick={() => setShowDeleteModal(false)}>
                        キャンセル
                      </button>
                      <button onClick={confirmDelete} className="btn btn-danger">
                        削除
                      </button>
                    </div>
                  </div>
                </div>
              )}


              

              {/* キーボードショートカットヘルプモーダル */}
              {showKeyboardHelp && (
                <div className="modal-overlay" onClick={() => setShowKeyboardHelp(false)}>
                  <div className="modal" onClick={(e) => e.stopPropagation()}>
                    <div className="modal-header">
                      <h3 className="modal-title">キーボードショートカット</h3>
                      <button className="modal-close" onClick={() => setShowKeyboardHelp(false)}>×</button>
                    </div>
                    <div className="modal-body">
                      <div className="keyboard-shortcuts">
                        <div className="shortcut-section">
                          <h4>ナビゲーション</h4>
                          <div className="shortcut-item">
                            <kbd>Ctrl</kbd> + <kbd>D</kbd>
                            <span>ダッシュボード表示</span>
                          </div>
                          <div className="shortcut-item">
                            <kbd>Ctrl</kbd> + <kbd>L</kbd>
                            <span>申込者一覧表示</span>
                          </div>
                        </div>
                        <div className="shortcut-section">
                          <h4>操作</h4>
                          <div className="shortcut-item">
                            <kbd>Ctrl</kbd> + <kbd>N</kbd>
                            <span>新規申込者登録</span>
                          </div>
                          <div className="shortcut-item">
                            <kbd>Ctrl</kbd> + <kbd>/</kbd>
                            <span>検索フィールドにフォーカス</span>
                          </div>
                        </div>
                        <div className="shortcut-section">
                          <h4>ヘルプ・その他</h4>
                          <div className="shortcut-item">
                            <kbd>Ctrl</kbd> + <kbd>?</kbd>
                            <span>このヘルプを表示</span>
                          </div>
                          <div className="shortcut-item">
                            <kbd>Esc</kbd>
                            <span>モーダル閉じる・検索クリア</span>
                          </div>
                        </div>
                      </div>
                      <div style={{marginTop: '16px', padding: '12px', background: '#f8f9fa', borderRadius: '6px', fontSize: '12px', color: '#6c757d'}}>
                        💡 ヒント: Macの場合は Cmd キーを使用してください
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* CSVインポートモーダル */}
              {showCSVImportModal && (
                <div className="modal-overlay" onClick={() => setShowCSVImportModal(false)}>
                  <div className="modal large-modal" onClick={(e) => e.stopPropagation()}>
                    <div className="modal-header">
                      <h3 className="modal-title">📊 ほのぼのNEXT CSVインポート</h3>
                      <button className="modal-close" onClick={() => setShowCSVImportModal(false)}>×</button>
                    </div>
                    <div className="modal-body">
                      {!csvImportData.length && !csvImportResult && (
                        <div className="csv-upload-area">
                          <div className="upload-instructions">
                            <h4>📋 インポート手順</h4>
                            <ol>
                              <li>ほのぼのNEXTから利用者データをCSVエクスポート</li>
                              <li>下記のファイル選択からCSVファイルをアップロード</li>
                              <li>プレビューを確認してインポート実行</li>
                            </ol>
                          </div>
                          
                          <div className="file-upload-section">
                            <input 
                              type="file" 
                              accept=".csv" 
                              onChange={handleFileUpload}
                              style={{display: 'none'}}
                              id="csv-file-input"
                            />
                            <label htmlFor="csv-file-input" className="btn btn-primary upload-btn">
                              📁 CSVファイルを選択
                            </label>
                          </div>

                          <div className="sample-section">
                            <p><strong>初回テスト用:</strong></p>
                            <button 
                              className="btn btn-secondary"
                              onClick={generateSampleCSV}
                            >
                              📝 サンプルCSVをダウンロード
                            </button>
                            <small className="text-muted">
                              ※ サンプルデータで動作確認できます
                            </small>
                          </div>
                        </div>
                      )}

                      {csvImportData.length > 0 && !csvImportResult && (
                        <div className="csv-preview">
                          <h4>📋 インポートプレビュー ({csvImportData.length}件)</h4>
                          <div className="preview-table-container">
                            <table className="preview-table">
                              <thead>
                                <tr>
                                  <th>氏名</th>
                                  <th>年齢</th>
                                  <th>要介護度</th>
                                  <th>ステータス</th>
                                  <th>キーパーソン</th>
                                  <th>担当者</th>
                                </tr>
                              </thead>
                              <tbody>
                                {csvImportData.slice(0, 5).map((row, index) => (
                                  <tr key={index}>
                                    <td>{row['氏名'] || row['姓'] + ' ' + row['名'] || '-'}</td>
                                    <td>{row['年齢'] || '-'}</td>
                                    <td>{row['要介護度'] || '-'}</td>
                                    <td>{row['ステータス'] || '申込書受領'}</td>
                                    <td>{row['キーパーソン'] || '-'}</td>
                                    <td>{row['担当者'] || '-'}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                            {csvImportData.length > 5 && (
                              <p className="text-muted">...他 {csvImportData.length - 5} 件</p>
                            )}
                          </div>
                          <div className="preview-actions">
                            <button 
                              className="btn btn-secondary"
                              onClick={() => {
                                setCsvImportData([]);
                                setCsvImportResult(null);
                              }}
                            >
                              キャンセル
                            </button>
                            <button 
                              className="btn btn-primary"
                              onClick={() => handleCSVImport(csvImportData)}
                            >
                              🚀 インポート実行
                            </button>
                          </div>
                        </div>
                      )}

                      {csvImportResult && (
                        <div className="import-result">
                          <h4>✅ インポート結果</h4>
                          <div className="result-summary">
                            <div className="result-item success">
                              <span className="result-label">成功:</span>
                              <span className="result-value">{csvImportResult.success}件</span>
                            </div>
                            <div className="result-item error">
                              <span className="result-label">エラー:</span>
                              <span className="result-value">{csvImportResult.error}件</span>
                            </div>
                          </div>

                          {csvImportResult.imported.length > 0 && (
                            <div className="imported-list">
                              <h5>📥 インポートされたデータ:</h5>
                              <ul>
                                {csvImportResult.imported.map((item, index) => (
                                  <li key={index}>{item}</li>
                                ))}
                              </ul>
                            </div>
                          )}

                          {csvImportResult.errors.length > 0 && (
                            <div className="error-list">
                              <h5>⚠️ エラー詳細:</h5>
                              <ul>
                                {csvImportResult.errors.map((error, index) => (
                                  <li key={index} className="error-item">{error}</li>
                                ))}
                              </ul>
                            </div>
                          )}

                          <div className="result-actions">
                            <button 
                              className="btn btn-primary"
                              onClick={() => {
                                setShowCSVImportModal(false);
                                setCsvImportData([]);
                                setCsvImportResult(null);
                                setCurrentView('dashboard'); // ダッシュボードを更新
                              }}
                            >
                              完了
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* AIチャットボタン */}
              {currentView === 'detail' && selectedApplicant && (
                <button
                  className="ai-chat-button"
                  title="AIに聞いてみる？"
                  onClick={openAIChat}
                >
                  AI
                </button>
              )}
            </div>
          );
        };

        ReactDOM.render(<CareFacilityApp />, document.getElementById('root'));
        // Cache buster: v2025010702
    </script>
    
    <footer style="margin-top: 40px; padding: 20px 0; border-top: 1px solid #e9ecef; text-align: center; background: #f8f9fa;">
        <div style="max-width: 800px; margin: 0 auto;">
            <div style="margin-bottom: 16px;">
                <a href="disclaimer.html" style="color: #6c757d; text-decoration: none; margin: 0 16px; font-size: 14px;">免責事項</a>
                <a href="privacy.html" style="color: #6c757d; text-decoration: none; margin: 0 16px; font-size: 14px;">プライバシーポリシー</a>
                <a href="credits.html" style="color: #6c757d; text-decoration: none; margin: 0 16px; font-size: 14px;">著作権・クレジット</a>
            </div>
            <div style="color: #adb5bd; font-size: 12px;">
                © 2025 FractiqLabs. All rights reserved.
            </div>
        </div>
    </footer>
</body>
</html>
